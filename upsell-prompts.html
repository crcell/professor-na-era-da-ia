<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>200 Prompts Premium — Protocolo Professor do Futuro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg:        #0D0B1A;
    --bg2:       #13112A;
    --bg3:       #1A1830;
    --bg4:       #1E1C35;
    --border:    rgba(255,255,255,0.07);
    --gold:      #F5A623;
    --gold-l:    #FFD166;
    --gold-dim:  rgba(245,166,35,0.12);
    --purple:    #8B5CF6;
    --purple-l:  #A78BFA;
    --purple-dim:rgba(139,92,246,0.12);
    --green:     #10B981;
    --green-dim: rgba(16,185,129,0.12);
    --white:     #FFFFFF;
    --t2:        #A8A8C4;
    --t3:        #6B6B8A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--white)}

/* ===== TELA DE LOGIN ===== */
#login-screen {
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 60% 20%, rgba(139,92,246,0.15) 0%, transparent 60%),
               radial-gradient(ellipse at 20% 80%, rgba(245,166,35,0.08) 0%, transparent 50%),
               var(--bg);
}
.login-card {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 40px;
    width:100%;max-width:440px;
    text-align:center;
}
.login-badge {
    display:inline-flex;align-items:center;gap:8px;
    background:var(--gold-dim);border:1px solid rgba(245,166,35,0.25);
    border-radius:100px;padding:6px 16px;
    font-size:11px;font-weight:700;color:var(--gold);
    letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;
}
.login-title {
    font-size:32px;font-weight:900;line-height:1.2;letter-spacing:-1px;
    margin-bottom:8px;
}
.login-title span {
    background:linear-gradient(135deg,#F5A623,#FFD166,#8B5CF6);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub {font-size:14px;color:var(--t2);margin-bottom:36px;line-height:1.6}
.login-label {
    display:block;text-align:left;
    font-size:11px;font-weight:700;color:var(--gold);
    letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;
}
.login-input {
    width:100%;background:var(--bg3);
    border:1px solid var(--border);border-radius:12px;
    padding:14px 18px;font-size:15px;color:var(--white);
    font-family:'Inter',sans-serif;outline:none;
    transition:border-color .2s;margin-bottom:16px;
}
.login-input:focus{border-color:rgba(245,166,35,0.5)}
.login-btn {
    width:100%;padding:16px;border-radius:60px;border:none;
    background:linear-gradient(135deg,var(--gold),var(--gold-l));
    color:#0D0B1A;font-size:15px;font-weight:800;
    cursor:pointer;letter-spacing:0.5px;
    box-shadow:0 8px 24px rgba(245,166,35,0.3);
    transition:transform .15s,box-shadow .15s;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(245,166,35,0.45)}
.login-error {
    background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
    border-radius:10px;padding:12px 16px;
    font-size:13px;color:#FCA5A5;margin-top:12px;display:none;
}

/* ===== APP PRINCIPAL ===== */
#app { display:none; height:100vh; overflow:hidden; }

/* TOPBAR */
.topbar {
    height:56px;background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:100;
}
.topbar-brand {
    display:flex;align-items:center;gap:10px;
    font-size:15px;font-weight:800;color:var(--white);
}
.topbar-brand .dot {
    width:8px;height:8px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),var(--purple));
}
.topbar-user {
    display:flex;align-items:center;gap:12px;
    font-size:13px;color:var(--t2);
}
.topbar-user span{color:var(--gold);font-weight:600}
.logout-btn {
    background:transparent;border:1px solid var(--border);
    border-radius:8px;padding:6px 12px;
    font-size:12px;color:var(--t3);cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:border-color .15s,color .15s;
}
.logout-btn:hover{border-color:rgba(245,166,35,0.4);color:var(--gold)}

/* LAYOUT */
.layout {
    display:flex;
    height:calc(100vh - 56px);
    margin-top:56px;
}

/* SIDEBAR */
.sidebar {
    width:220px;flex-shrink:0;
    background:var(--bg2);
    border-right:1px solid var(--border);
    overflow-y:auto;padding:16px 0;
}
.sidebar-section-label {
    font-size:9px;font-weight:700;letter-spacing:2px;
    text-transform:uppercase;color:var(--t3);
    padding:8px 20px 6px;
}
.sidebar-item {
    display:flex;align-items:center;gap:12px;
    padding:10px 20px;cursor:pointer;
    font-size:14px;font-weight:500;color:var(--t2);
    border-radius:0;transition:background .15s,color .15s;
    border-left:3px solid transparent;
}
.sidebar-item:hover{background:rgba(255,255,255,0.04);color:var(--white)}
.sidebar-item.active {
    background:var(--gold-dim);color:var(--gold);
    border-left-color:var(--gold);font-weight:600;
}
.sidebar-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-count {
    margin-left:auto;background:var(--bg4);
    border-radius:100px;padding:2px 8px;
    font-size:10px;font-weight:600;color:var(--t3);
}

/* MAIN */
.main {
    flex:1;overflow-y:auto;
    padding:32px 36px;
    background:var(--bg);
}

/* WELCOME */
.welcome-header{margin-bottom:32px}
.welcome-title {
    font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px;
}
.welcome-sub{font-size:14px;color:var(--t2)}

/* MATÉRIA HEADER */
.subject-header {
    display:flex;align-items:center;gap:16px;margin-bottom:28px;
}
.subject-icon-big {
    width:52px;height:52px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    background:var(--gold-dim);border:1px solid rgba(245,166,35,0.2);
}
.subject-name {
    font-size:26px;font-weight:900;letter-spacing:-0.5px;
}
.subject-total {
    font-size:13px;color:var(--t3);margin-top:2px;
}

/* CATEGORY TABS */
.cat-tabs {
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;
}
.cat-tab {
    padding:8px 18px;border-radius:100px;
    border:1px solid var(--border);
    font-size:13px;font-weight:600;color:var(--t2);
    cursor:pointer;transition:all .15s;background:transparent;
    font-family:'Inter',sans-serif;
}
.cat-tab:hover{border-color:rgba(245,166,35,0.4);color:var(--gold)}
.cat-tab.active{background:var(--gold-dim);border-color:rgba(245,166,35,0.4);color:var(--gold)}

/* PROMPTS LIST */
.prompts-list{display:flex;flex-direction:column;gap:12px}
.prompt-card {
    background:var(--bg3);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;
    transition:border-color .15s;
}
.prompt-card:hover{border-color:rgba(245,166,35,0.2)}
.prompt-header-bar {
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;
    background:var(--bg4);border-bottom:1px solid var(--border);
}
.prompt-num {
    width:28px;height:28px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--gold),var(--gold-l));
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#0D0B1A;
}
.prompt-title-text{font-size:13px;font-weight:700;color:var(--white);flex:1}
.copy-btn {
    background:var(--gold-dim);border:1px solid rgba(245,166,35,0.25);
    color:var(--gold);border-radius:8px;padding:6px 12px;
    font-size:11px;font-weight:700;cursor:pointer;
    font-family:'Inter',sans-serif;letter-spacing:0.3px;
    transition:background .15s;white-space:nowrap;
}
.copy-btn:hover{background:rgba(245,166,35,0.22)}
.copy-btn.copied{background:var(--green-dim);border-color:rgba(16,185,129,0.3);color:var(--green)}
.prompt-body-area{padding:14px 16px}
.prompt-text-box {
    font-size:13px;line-height:1.65;color:var(--t2);
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;font-style:italic;
}

/* WELCOME CARDS */
.welcome-grid {
    display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;
    margin-top:24px;
}
.welcome-card {
    background:var(--bg3);border:1px solid var(--border);
    border-radius:16px;padding:20px 18px;
    cursor:pointer;transition:all .2s;text-align:center;
}
.welcome-card:hover{border-color:rgba(245,166,35,0.3);transform:translateY(-2px)}
.welcome-card .wc-icon{font-size:32px;margin-bottom:10px}
.welcome-card .wc-name{font-size:14px;font-weight:700;margin-bottom:4px}
.welcome-card .wc-count{font-size:12px;color:var(--t3)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:100px}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-badge">✦ Acesso Exclusivo</div>
    <h1 class="login-title">200 Prompts<br><span>Premium</span></h1>
    <p class="login-sub">Digite o email que você usou na compra para acessar sua biblioteca completa de prompts.</p>
    <label class="login-label">Seu email de acesso</label>
    <input id="email-input" class="login-input" type="email" placeholder="seuemail@exemplo.com" autocomplete="email">
    <button class="login-btn" onclick="fazerLogin()">Acessar Minha Biblioteca →</button>
    <div id="login-error" class="login-error">Email não encontrado. Verifique se é o mesmo email usado na compra ou entre em contato pelo Instagram.</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="dot"></div>
      200 Prompts Premium — Professor do Futuro
    </div>
    <div class="topbar-user">
      Olá, <span id="user-email-display"></span>
      <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section-label">Matérias</div>
      <div id="sidebar-menu"></div>
    </div>
    <div class="main" id="main-content">
      <!-- conteúdo dinâmico -->
    </div>
  </div>
</div>

<script>
// ============================================================
// LISTA DE EMAILS AUTORIZADOS
// Adicione o email do aluno após cada venda
// ============================================================
const EMAILS_AUTORIZADOS = [
    "teste@teste.com",
    "cesar@exemplo.com",
    "cr7infor@gmail.com",
    // adicione aqui os emails dos compradores
];

// ============================================================
// DADOS — 200 PROMPTS (8 matérias × 5 categorias × 5 prompts)
// ============================================================
const MATERIAS = [
  { id:"portugues",  icon:"📝", nome:"Português",       cor:"gold"   },
  { id:"matematica", icon:"🔢", nome:"Matemática",       cor:"purple" },
  { id:"ciencias",   icon:"🔬", nome:"Ciências",         cor:"green"  },
  { id:"historia",   icon:"📚", nome:"História",         cor:"gold"   },
  { id:"geografia",  icon:"🌍", nome:"Geografia",        cor:"purple" },
  { id:"artes",      icon:"🎨", nome:"Artes",            cor:"green"  },
  { id:"edfisica",   icon:"⚽", nome:"Ed. Física",       cor:"gold"   },
  { id:"ingles",     icon:"🌐", nome:"Inglês",           cor:"purple" },
];

const CATEGORIAS = ["Plano de Aula","Prova","Exercício","Gabarito","Atividade Criativa"];

const PROMPTS = {
portugues: {
  "Plano de Aula": [
    { titulo:"Leitura e Interpretação", texto:"Crie um plano de aula completo de Língua Portuguesa para [SÉRIE] sobre leitura e interpretação de texto. Tema do texto: [TEMA]. Inclua: objetivos (BNCC), duração de 50 minutos, recursos, 3 momentos pedagógicos (inicial, central, final), avaliação e adaptação para alunos com dificuldade." },
    { titulo:"Produção Textual", texto:"Elabore um plano de aula de produção textual para [SÉRIE]. Gênero: [GÊNERO TEXTUAL]. Inclua motivação com texto de referência, planejamento coletivo, escrita individual e momento de reescrita. Duração: 2 aulas de 50 minutos." },
    { titulo:"Gramática Contextualizada", texto:"Desenvolva um plano de aula de gramática para [SÉRIE] sobre [CONTEÚDO GRAMATICAL]. Use abordagem contextualizada com textos reais. Inclua exemplos do cotidiano, exercícios progressivos e um jogo linguístico para fixação." },
    { titulo:"Oralidade e Expressão", texto:"Monte um plano de aula de oralidade para [SÉRIE] com foco em [HABILIDADE: debate, apresentação oral, reconto]. Inclua organização da turma, roteiro de atividade, critérios de avaliação e como lidar com a timidez dos alunos." },
    { titulo:"Literatura Infantil", texto:"Crie um plano de aula de literatura para [SÉRIE] usando o livro '[TÍTULO]' de [AUTOR]. Inclua: roda de leitura, discussão temática, atividade de criação inspirada na obra e conexão com a realidade dos alunos." },
  ],
  "Prova": [
    { titulo:"Prova Completa com Texto", texto:"Crie uma prova de Língua Portuguesa para [SÉRIE] com 10 questões. Inclua: 1 texto para leitura, 5 questões de interpretação (3 objetivas, 2 dissertativas), 3 questões de gramática sobre [CONTEÚDO] e 2 questões de produção textual. Nível: médio." },
    { titulo:"Avaliação Diagnóstica", texto:"Elabore uma avaliação diagnóstica de Língua Portuguesa para [SÉRIE] para identificar dificuldades de leitura, escrita e gramática. 8 questões variadas com diferentes formatos. Inclua instruções claras para o aluno." },
    { titulo:"Prova de Recuperação", texto:"Crie uma prova de recuperação de Língua Portuguesa para [SÉRIE] sobre [CONTEÚDO]. As questões devem ser mais acessíveis mas cobrir as mesmas competências. Inclua textos de apoio e instruções detalhadas." },
    { titulo:"Avaliação Oral", texto:"Monte um roteiro de avaliação oral de Língua Portuguesa para [SÉRIE]. Atividade: [leitura em voz alta / apresentação / reconto]. Inclua rubrica de pontuação com critérios claros e observáveis." },
    { titulo:"Prova Contextualizada", texto:"Elabore uma prova de Língua Portuguesa para [SÉRIE] usando o tema interdisciplinar [TEMA]. Questões que integrem leitura, gramática e escrita de forma contextualizada. 8 questões no total." },
  ],
  "Exercício": [
    { titulo:"Interpretação de Texto", texto:"Crie 10 exercícios de interpretação de texto para [SÉRIE] baseados no seguinte trecho: [COLE O TEXTO]. Varie os tipos: verdadeiro/falso, múltipla escolha, resposta aberta, identificação de informações e inferência." },
    { titulo:"Gramática Progressiva", texto:"Elabore uma lista de 12 exercícios de [CONTEÚDO GRAMATICAL] para [SÉRIE]. Comece com identificação, avance para classificação e termine com aplicação em texto. Aumente a dificuldade gradualmente." },
    { titulo:"Ortografia e Acentuação", texto:"Crie 15 exercícios de ortografia e acentuação para [SÉRIE]. Formatos: complete as lacunas, corrija os erros, classifique as palavras. Inclua palavras do vocabulário cotidiano dos alunos." },
    { titulo:"Produção Textual Guiada", texto:"Monte uma atividade de produção textual guiada para [SÉRIE]. Gênero: [GÊNERO]. Inclua: proposta motivadora com imagem ou vídeo, sequência de planejamento, escrita e grade de autoavaliação." },
    { titulo:"Revisão de Conteúdo", texto:"Crie uma atividade de revisão de Língua Portuguesa para [SÉRIE] cobrindo: interpretação de texto, [CONTEÚDO GRAMATICAL] e ortografia. Formato lúdico com desafios em nível crescente. 20 questões no total." },
  ],
  "Gabarito": [
    { titulo:"Gabarito Comentado de Prova", texto:"Crie o gabarito completo e comentado para a seguinte prova de Língua Portuguesa: [COLE AS QUESTÕES]. Para questões dissertativas: resposta esperada, critérios de correção e pontuação parcial. Para objetivas: resposta correta e justificativa." },
    { titulo:"Rubrica de Produção Textual", texto:"Elabore uma rubrica de correção de produção textual para [SÉRIE]. Gênero: [GÊNERO]. Critérios: estrutura, adequação ao gênero, coesão, coerência, gramática e ortografia. Níveis: insuficiente, básico, adequado, avançado. Pontuação de 0 a 10." },
    { titulo:"Gabarito de Lista de Exercícios", texto:"Elabore o gabarito da seguinte lista de exercícios com explicações para as questões mais difíceis: [COLE OS EXERCÍCIOS]. Indique os 3 erros mais comuns que os alunos cometem em cada questão." },
    { titulo:"Espelho de Correção", texto:"Monte um espelho de correção detalhado para redação de [SÉRIE] sobre [TEMA]. Inclua: competências avaliadas, descritores por nível com exemplos de trechos e pontuação proporcional." },
    { titulo:"Gabarito com Recomendações", texto:"Crie gabarito para avaliação de Língua Portuguesa de [SÉRIE] e, para cada questão com índice de erro acima de 50%, sugira uma atividade de retomada específica. Questões: [COLE AQUI]." },
  ],
  "Atividade Criativa": [
    { titulo:"Jogo Linguístico", texto:"Crie uma atividade lúdica de Língua Portuguesa para [SÉRIE] no formato de [JOGO: bingo de palavras, caça-palavras, cruzadinha, jogo da memória]. Tema: [CONTEÚDO]. Inclua regras, material necessário e como aplicar com turmas grandes." },
    { titulo:"Projeto de Escrita Criativa", texto:"Elabore um projeto de escrita criativa para [SÉRIE]. Tema: [TEMA]. Inclua: motivação inicial, etapas de criação em 3 aulas, como organizar uma publicação coletiva (mural, livro da turma, blog escolar)." },
    { titulo:"Teatro de Leitura", texto:"Crie uma atividade de teatro de leitura para [SÉRIE] baseada em [TEXTO/GÊNERO]. Adapte para leitura dramatizada, distribua papéis, inclua dicas de expressão oral e como avaliar sem constranger os alunos tímidos." },
    { titulo:"Podcast Escolar", texto:"Monte um projeto de podcast escolar para [SÉRIE] sobre [TEMA]. Inclua: roteiro de cada episódio, como gravar com celular, perguntas guia para cada aluno, e critérios de avaliação da expressão oral." },
    { titulo:"Gincana Literária", texto:"Desenvolva uma gincana literária para [SÉRIE] com a obra [TÍTULO]. Crie perguntas por nível de dificuldade (fácil/médio/difícil), dinâmicas em grupo, sistema de pontuação e como tornar a atividade inclusiva para todos os alunos." },
  ],
},

matematica: {
  "Plano de Aula": [
    { titulo:"Números e Operações", texto:"Crie um plano de aula de Matemática para [SÉRIE] sobre [OPERAÇÃO: adição, subtração, multiplicação, divisão]. Inclua situação-problema do cotidiano, resolução em etapas, materiais concretos e como usar o erro como aprendizagem." },
    { titulo:"Frações no Cotidiano", texto:"Elabore um plano de aula sobre frações para [SÉRIE] usando exemplos do dia a dia (pizzas, receitas, metade de objetos). Inclua: conceito, representação, comparação e operações básicas com frações. Duração: 2 aulas." },
    { titulo:"Geometria Prática", texto:"Monte um plano de aula de geometria para [SÉRIE] sobre [CONTEÚDO: figuras planas, sólidos geométricos, ângulos, perímetro, área]. Use objetos reais da sala de aula como material didático. Inclua atividade de construção e medição." },
    { titulo:"Resolução de Problemas", texto:"Desenvolva um plano de aula focado em resolução de problemas matemáticos para [SÉRIE]. Use a estratégia de 4 etapas (compreender, planejar, executar, verificar). Problemas do contexto local dos alunos." },
    { titulo:"Sistema de Medidas", texto:"Crie um plano de aula sobre medidas para [SÉRIE]: [TIPO: comprimento, massa, capacidade, tempo, temperatura]. Inclua experimentação com instrumentos reais, conversão de unidades e aplicação em situações práticas." },
  ],
  "Prova": [
    { titulo:"Prova com Situações-Problema", texto:"Crie uma prova de Matemática para [SÉRIE] com 8 questões. Inclua: 4 situações-problema contextualizadas, 2 questões de cálculo direto, 1 questão de geometria e 1 questão de medidas. Evite questões puramente mecânicas." },
    { titulo:"Avaliação Diagnóstica", texto:"Elabore uma avaliação diagnóstica de Matemática para [SÉRIE] para identificar conhecimentos prévios sobre [CONTEÚDO]. 10 questões que mapeiem desde o básico até o esperado para a série." },
    { titulo:"Prova de Geometria", texto:"Monte uma prova de geometria para [SÉRIE] com 10 questões. Inclua: identificação de figuras, cálculo de perímetro e área, sólidos geométricos e construção com régua e compasso. Adicione figuras ilustrativas." },
    { titulo:"Prova de Números e Operações", texto:"Crie uma prova de números e operações para [SÉRIE] com 12 questões progressivas. Inclua: operações, ordem dos números, problemas com múltiplas etapas e questão de raciocínio lógico." },
    { titulo:"Prova de Recuperação", texto:"Elabore uma prova de recuperação de Matemática para [SÉRIE] sobre [CONTEÚDO]. Questões mais acessíveis com dicas visuais, divididas em etapas. Inclua espaço para o aluno mostrar o raciocínio." },

let materiaAtiva = null;
let categoriaAtiva = null;

function fazerLogin() {
    const email = document.getElementById('email-input').value.trim().toLowerCase();
    const erro = document.getElementById('login-error');
    const autorizados = EMAILS_AUTORIZADOS.map(e => e.toLowerCase());
    if (!email) { erro.style.display='block'; erro.textContent='Digite seu email.'; return; }
    if (autorizados.includes(email)) {
        localStorage.setItem('prompts_email', email);
        iniciarApp(email);
    } else {
        erro.style.display='block';
        erro.textContent='Email não encontrado. Verifique se é o mesmo email usado na compra ou entre em contato pelo Instagram.';
    }
}

document.getElementById('email-input').addEventListener('keydown', e => { if(e.key==='Enter') fazerLogin(); });

function fazerLogout() {
    localStorage.removeItem('prompts_email');
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('email-input').value='';
}

function iniciarApp(email) {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-email-display').textContent = email;
    renderSidebar();
    renderWelcome();
}

function renderSidebar() {
    const menu = document.getElementById('sidebar-menu');
    menu.innerHTML = MATERIAS.map(m => `
        <div class="sidebar-item" id="sb-${m.id}" onclick="selecionarMateria('${m.id}')">
            <span class="icon">${m.icon}</span>
            <span>${m.nome}</span>
            <span class="sidebar-count">25</span>
        </div>
    `).join('');
}

        </div>
        <div class="welcome-grid">
            ${MATERIAS.map(m => `
                <div class="welcome-card" onclick="selecionarMateria('${m.id}')">
                    <div class="wc-icon">${m.icon}</div>
                    <div class="wc-name">${m.nome}</div>
                    <div class="wc-count">25 prompts</div>
                </div>
            `).join('')}
        </div>
    `;
}

function selecionarMateria(id) {
    materiaAtiva = id;
    categoriaAtiva = CATEGORIAS[0];
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    document.getElementById('sb-'+id)?.classList.add('active');
    renderMateria();
}

function selecionarCategoria(cat) {
    categoriaAtiva = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-cat="${cat}"]`)?.classList.add('active');
    renderPrompts();
}

function renderMateria() {
    const m = MATERIAS.find(x => x.id === materiaAtiva);
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div class="subject-header">
            <div class="subject-icon-big">${m.icon}</div>
            <div>
                <div class="subject-name">${m.nome}</div>
                <div class="subject-total">25 prompts em 5 categorias</div>
            </div>
        </div>
        <div class="cat-tabs">
            ${CATEGORIAS.map(c => `
                <button class="cat-tab ${c===categoriaAtiva?'active':''}" data-cat="${c}" onclick="selecionarCategoria('${c}')">${c}</button>
            `).join('')}
        </div>
        <div id="prompts-area"></div>
    `;
    renderPrompts();
}

function renderPrompts() {
    const dados = PROMPTS[materiaAtiva]?.[categoriaAtiva] || [];
    const area = document.getElementById('prompts-area');
    area.innerHTML = `<div class="prompts-list">
        ${dados.map((p,i) => `
            <div class="prompt-card">
                <div class="prompt-header-bar">
                    <div class="prompt-num">${i+1}</div>
                    <div class="prompt-title-text">${p.titulo}</div>
                    <button class="copy-btn" onclick="copiarPrompt(this, \`${p.texto.replace(/`/g,'\\`')}\`)">📋 Copiar</button>
                </div>
                <div class="prompt-body-area">
                    <div class="prompt-text-box">${p.texto}</div>
                </div>
            </div>
        `).join('')}
    </div>`;
}

function copiarPrompt(btn, texto) {
    navigator.clipboard.writeText(texto).then(() => {
        btn.textContent='✅ Copiado!';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 Copiar'; btn.classList.remove('copied'); }, 2000);
    }).catch(()=>{
        const ta = document.createElement('textarea');
        ta.value = texto; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent='✅ Copiado!'; btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 Copiar'; btn.classList.remove('copied'); }, 2000);
    });
}

// Auto-login se já estiver logado
window.addEventListener('load', () => {
    const email = localStorage.getItem('prompts_email');
    if (email) iniciarApp(email);
});
</script>
</body>
</html>
