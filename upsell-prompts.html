<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>200 Prompts Premium — Protocolo Professor do Futuro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg:        #0D0B1A;
    --bg2:       #13112A;
    --bg3:       #1A1830;
    --bg4:       #1E1C35;
    --border:    rgba(255,255,255,0.07);
    --gold:      #F5A623;
    --gold-l:    #FFD166;
    --gold-dim:  rgba(245,166,35,0.12);
    --purple:    #8B5CF6;
    --purple-l:  #A78BFA;
    --purple-dim:rgba(139,92,246,0.12);
    --green:     #10B981;
    --green-dim: rgba(16,185,129,0.12);
    --white:     #FFFFFF;
    --t2:        #A8A8C4;
    --t3:        #6B6B8A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--white)}

/* ===== TELA DE LOGIN ===== */
#login-screen {
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 60% 20%, rgba(139,92,246,0.15) 0%, transparent 60%),
               radial-gradient(ellipse at 20% 80%, rgba(245,166,35,0.08) 0%, transparent 50%),
               var(--bg);
}
.login-card {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 40px;
    width:100%;max-width:440px;
    text-align:center;
}
.login-badge {
    display:inline-flex;align-items:center;gap:8px;
    background:var(--gold-dim);border:1px solid rgba(245,166,35,0.25);
    border-radius:100px;padding:6px 16px;
    font-size:11px;font-weight:700;color:var(--gold);
    letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;
}
.login-title {
    font-size:32px;font-weight:900;line-height:1.2;letter-spacing:-1px;
    margin-bottom:8px;
}
.login-title span {
    background:linear-gradient(135deg,#F5A623,#FFD166,#8B5CF6);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub {font-size:14px;color:var(--t2);margin-bottom:36px;line-height:1.6}
.login-label {
    display:block;text-align:left;
    font-size:11px;font-weight:700;color:var(--gold);
    letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;
}
.login-input {
    width:100%;background:var(--bg3);
    border:1px solid var(--border);border-radius:12px;
    padding:14px 18px;font-size:15px;color:var(--white);
    font-family:'Inter',sans-serif;outline:none;
    transition:border-color .2s;margin-bottom:16px;
}
.login-input:focus{border-color:rgba(245,166,35,0.5)}
.login-btn {
    width:100%;padding:16px;border-radius:60px;border:none;
    background:linear-gradient(135deg,var(--gold),var(--gold-l));
    color:#0D0B1A;font-size:15px;font-weight:800;
    cursor:pointer;letter-spacing:0.5px;
    box-shadow:0 8px 24px rgba(245,166,35,0.3);
    transition:transform .15s,box-shadow .15s;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(245,166,35,0.45)}
.login-error {
    background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
    border-radius:10px;padding:12px 16px;
    font-size:13px;color:#FCA5A5;margin-top:12px;display:none;
}

/* ===== APP PRINCIPAL ===== */
#app { display:none; height:100vh; overflow:hidden; }

/* TOPBAR */
.topbar {
    height:56px;background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:100;
}
.topbar-brand {
    display:flex;align-items:center;gap:10px;
    font-size:15px;font-weight:800;color:var(--white);
}
.topbar-brand .dot {
    width:8px;height:8px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),var(--purple));
}
.topbar-user {
    display:flex;align-items:center;gap:12px;
    font-size:13px;color:var(--t2);
}
.topbar-user span{color:var(--gold);font-weight:600}
.logout-btn {
    background:transparent;border:1px solid var(--border);
    border-radius:8px;padding:6px 12px;
    font-size:12px;color:var(--t3);cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:border-color .15s,color .15s;
}
.logout-btn:hover{border-color:rgba(245,166,35,0.4);color:var(--gold)}

/* LAYOUT */
.layout {
    display:flex;
    height:calc(100vh - 56px);
    margin-top:56px;
}

/* SIDEBAR */
.sidebar {
    width:220px;flex-shrink:0;
    background:var(--bg2);
    border-right:1px solid var(--border);
    overflow-y:auto;padding:16px 0;
}
.sidebar-section-label {
    font-size:9px;font-weight:700;letter-spacing:2px;
    text-transform:uppercase;color:var(--t3);
    padding:8px 20px 6px;
}
.sidebar-item {
    display:flex;align-items:center;gap:12px;
    padding:10px 20px;cursor:pointer;
    font-size:14px;font-weight:500;color:var(--t2);
    border-radius:0;transition:background .15s,color .15s;
    border-left:3px solid transparent;
}
.sidebar-item:hover{background:rgba(255,255,255,0.04);color:var(--white)}
.sidebar-item.active {
    background:var(--gold-dim);color:var(--gold);
    border-left-color:var(--gold);font-weight:600;
}
.sidebar-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-count {
    margin-left:auto;background:var(--bg4);
    border-radius:100px;padding:2px 8px;
    font-size:10px;font-weight:600;color:var(--t3);
}

/* MAIN */
.main {
    flex:1;overflow-y:auto;
    padding:32px 36px;
    background:var(--bg);
}

/* WELCOME */
.welcome-header{margin-bottom:32px}
.welcome-title {
    font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px;
}
.welcome-sub{font-size:14px;color:var(--t2)}

/* MATÉRIA HEADER */
.subject-header {
    display:flex;align-items:center;gap:16px;margin-bottom:28px;
}
.subject-icon-big {
    width:52px;height:52px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    background:var(--gold-dim);border:1px solid rgba(245,166,35,0.2);
}
.subject-name {
    font-size:26px;font-weight:900;letter-spacing:-0.5px;
}
.subject-total {
    font-size:13px;color:var(--t3);margin-top:2px;
}

/* CATEGORY TABS */
.cat-tabs {
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;
}
.cat-tab {
    padding:8px 18px;border-radius:100px;
    border:1px solid var(--border);
    font-size:13px;font-weight:600;color:var(--t2);
    cursor:pointer;transition:all .15s;background:transparent;
    font-family:'Inter',sans-serif;
}
.cat-tab:hover{border-color:rgba(245,166,35,0.4);color:var(--gold)}
.cat-tab.active{background:var(--gold-dim);border-color:rgba(245,166,35,0.4);color:var(--gold)}

/* PROMPTS LIST */
.prompts-list{display:flex;flex-direction:column;gap:12px}
.prompt-card {
    background:var(--bg3);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;
    transition:border-color .15s;
}
.prompt-card:hover{border-color:rgba(245,166,35,0.2)}
.prompt-header-bar {
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;
    background:var(--bg4);border-bottom:1px solid var(--border);
}
.prompt-num {
    width:28px;height:28px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--gold),var(--gold-l));
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#0D0B1A;
}
.prompt-title-text{font-size:13px;font-weight:700;color:var(--white);flex:1}
.copy-btn {
    background:var(--gold-dim);border:1px solid rgba(245,166,35,0.25);
    color:var(--gold);border-radius:8px;padding:6px 12px;
    font-size:11px;font-weight:700;cursor:pointer;
    font-family:'Inter',sans-serif;letter-spacing:0.3px;
    transition:background .15s;white-space:nowrap;
}
.copy-btn:hover{background:rgba(245,166,35,0.22)}
.copy-btn.copied{background:var(--green-dim);border-color:rgba(16,185,129,0.3);color:var(--green)}
.prompt-body-area{padding:14px 16px}
.prompt-text-box {
    font-size:13px;line-height:1.75;color:var(--t2);
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;
    white-space:pre-wrap;
    margin-bottom:12px;
}
.copy-btn-wrap{display:flex;justify-content:flex-end}

/* WELCOME CARDS */
.welcome-grid {
    display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;
    margin-top:24px;
}
.welcome-card {
    background:var(--bg3);border:1px solid var(--border);
    border-radius:16px;padding:20px 18px;
    cursor:pointer;transition:all .2s;text-align:center;
}
.welcome-card:hover{border-color:rgba(245,166,35,0.3);transform:translateY(-2px)}
.welcome-card .wc-icon{font-size:32px;margin-bottom:10px}
.welcome-card .wc-name{font-size:14px;font-weight:700;margin-bottom:4px}
.welcome-card .wc-count{font-size:12px;color:var(--t3)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:100px}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-badge">✦ Acesso Exclusivo</div>
    <h1 class="login-title">200 Prompts<br><span>Premium</span></h1>
    <p class="login-sub">Digite o email que você usou na compra para acessar sua biblioteca completa de prompts.</p>
    <label class="login-label">Seu email de acesso</label>
    <input id="email-input" class="login-input" type="email" placeholder="seuemail@exemplo.com" autocomplete="email">
    <button class="login-btn" onclick="fazerLogin()">Acessar Minha Biblioteca →</button>
    <div id="login-error" class="login-error">Email não encontrado. Verifique se é o mesmo email usado na compra ou entre em contato pelo Instagram.</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="dot"></div>
      200 Prompts Premium — Professor do Futuro
    </div>
    <div class="topbar-user">
      Olá, <span id="user-email-display"></span>
      <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section-label">Matérias</div>
      <div id="sidebar-menu"></div>
    </div>
    <div class="main" id="main-content">
      <!-- conteúdo dinâmico -->
    </div>
  </div>
</div>

<script>
// ============================================================
// LISTA DE EMAILS AUTORIZADOS
// Adicione o email do aluno após cada venda
// ============================================================
const EMAILS_AUTORIZADOS = [

];

// ============================================================

// ============================================================
const MATERIAS = [
  { id:"portugues",  icon:"📝", nome:"Português",       cor:"gold"   },
  { id:"matematica", icon:"🔢", nome:"Matemática",       cor:"purple" },
  { id:"ciencias",   icon:"🔬", nome:"Ciências",         cor:"green"  },
  { id:"historia",   icon:"📚", nome:"História",         cor:"gold"   },
  { id:"geografia",  icon:"🌍", nome:"Geografia",        cor:"purple" },
  { id:"artes",      icon:"🎨", nome:"Artes",            cor:"green"  },
  { id:"edfisica",   icon:"⚽", nome:"Ed. Física",       cor:"gold"   },
  { id:"ingles",     icon:"🌐", nome:"Inglês",           cor:"purple" },
];

const CATEGORIAS = ["Plano de Aula","Prova","Exercício","Gabarito","Atividade Criativa"];

const PROMPTS = {
portugues: {
  "Plano de Aula": [
    { titulo:"Leitura e Interpretação de Texto", texto:`Aja como um pedagogo especialista em Língua Portuguesa do Ensino Fundamental, com domínio da BNCC e metodologias ativas de leitura. Crie um PLANO DE AULA COMPLETO e detalhado com as seguintes especificações:

DADOS DA AULA
• Disciplina: Língua Portuguesa
• Série: [SÉRIE — ex: 4º ano]
• Duração: 2 aulas de 50 minutos
• Conteúdo: Leitura e Interpretação de Texto
• Tema do texto: [TEMA — ex: meio ambiente, amizade, diversidade]
• Turma: aproximadamente [Nº DE ALUNOS] alunos

ESTRUTURA OBRIGATÓRIA:

1. HABILIDADES DA BNCC
Liste 3 habilidades específicas com código (EF__LP__) e descrição completa. Priorize habilidades de leitura e compreensão.

2. OBJETIVOS DE APRENDIZAGEM
— Objetivo geral: o que o aluno será capaz de fazer ao final
— 4 objetivos específicos com verbos de ação (identificar, inferir, comparar, justificar, relacionar)

3. MATERIAIS NECESSÁRIOS
Lista completa com quantidade para a turma

4. DESENVOLVIMENTO DA AULA

▸ MOMENTO 1 — ATIVAÇÃO DO CONHECIMENTO PRÉVIO (10 min)
Perguntas orais disparadoras sobre o tema. Como criar curiosidade antes de apresentar o texto. Estratégia de previsão por título e imagem.

▸ MOMENTO 2 — LEITURA COMPARTILHADA (15 min)
Estratégia de leitura: primeira leitura silenciosa, segunda leitura em voz alta compartilhada. Como tratar vocabulário desconhecido sem interromper o fluxo. Perguntas de verificação durante a leitura.

▸ MOMENTO 3 — EXPLORAÇÃO E INTERPRETAÇÃO (20 min)
Questões orais e escritas em 3 níveis: literal (o que o texto diz), inferencial (o que o texto sugere) e crítico (o que você pensa). Como organizar: individual → dupla → turma.

▸ MOMENTO 4 — PRODUÇÃO E REGISTRO (10 min)
Atividade escrita de resposta ao texto (parágrafo de opinião, resumo ou releitura curta). Orientações para o aluno que trava na escrita.

▸ MOMENTO 5 — FECHAMENTO (5 min)
Retomada oral dos objetivos. "O que aprendemos hoje?" — registro no caderno. Como avaliar informalmente a compreensão da turma.

5. AVALIAÇÃO
— Instrumento: observação + produção escrita
— Critérios: compreensão literal, inferência, vocabulário, coesão
— Como registrar: ficha descritiva ou rubrica com 4 níveis

6. ADAPTAÇÕES
— Alunos com dificuldade de leitura: texto em versão simplificada, leitura em dupla apoiada
— Alunos avançados: questão extra de análise crítica, conexão com outro texto
— Alunos com necessidades especiais (dislexia, TDAH): fonte ampliada, texto menor, apoio visual

7. TAREFA DE CASA
Atividade de 15 minutos para consolidar a interpretação em casa com a família.

Gere o plano COMPLETO, detalhado e pronto para aplicar na próxima aula. Crie também o texto-base adequado à série com tema [TEMA], com vocabulário rico mas acessível.` },

    { titulo:"Produção Textual — Do Planejamento à Reescrita", texto:`Aja como pedagogo especialista em escrita no Ensino Fundamental, com domínio de sequências didáticas de produção textual. Crie um PLANO DE AULA COMPLETO de produção textual com as seguintes especificações:

DADOS DA AULA
• Disciplina: Língua Portuguesa
• Série: [SÉRIE]
• Duração: 3 aulas de 50 minutos (sequência completa)
• Gênero textual: [GÊNERO — ex: conto, notícia, carta, poema, fábula, relato de experiência]
• Tema: [TEMA]
• Situação comunicativa real: [para quem, com que objetivo]

ESTRUTURA DAS 3 AULAS:

AULA 1 — LEITURA DE REFERÊNCIA E PLANEJAMENTO
▸ Sensibilização (10 min): vídeo, imagem ou situação que justifique por que escrever esse texto
▸ Leitura de 2 textos do gênero (20 min): identificar estrutura, linguagem, intenção comunicativa
▸ Construção coletiva do "mapa do gênero" (15 min): características obrigatórias, opcionais, linguagem típica
▸ Planejamento individual (5 min): ficha de planejamento — tema, destinatário, ideia central

AULA 2 — PRIMEIRA ESCRITA
▸ Retomada do planejamento (5 min)
▸ Escrita individual da 1ª versão (35 min): professor circula, mediando sem corrigir
▸ Leitura entre pares (10 min): troca de texto + ficha de revisão com 5 perguntas objetivas

AULA 3 — REESCRITA E PUBLICAÇÃO
▸ Devolução com marcações (10 min): professor devolve com perguntas, não com correções
▸ Reescrita orientada (25 min): foco nos aspectos do gênero, não apenas na gramática
▸ Publicação (15 min): como compartilhar os textos (mural, livro coletivo, leitura em voz alta)

HABILIDADES BNCC: liste 4 habilidades específicas com código
CRITÉRIOS DE AVALIAÇÃO: rubrica com 5 critérios, 4 níveis cada
ADAPTAÇÕES: para alunos com bloqueio de escrita, para alunos avançados
FICHA DE PLANEJAMENTO DO ALUNO: modelo completo para imprimir

Gere o plano completo com todos os materiais incluídos.` },

    { titulo:"Gramática Viva e Contextualizada", texto:`Aja como linguista educacional especialista no ensino de gramática no Ensino Fundamental, com abordagem epilinguística e metalinguística. Crie um PLANO DE AULA COMPLETO que ensine gramática de forma contextualizada, sem gramática pela gramática.

DADOS DA AULA
• Disciplina: Língua Portuguesa
• Série: [SÉRIE]
• Duração: 50 minutos
• Conteúdo gramatical: [CONTEÚDO — ex: substantivos, verbos no presente, pontuação, concordância, pronomes]
• Texto-base para contextualização: [GÊNERO/TEMA do texto que você vai usar]

SEQUÊNCIA DIDÁTICA COMPLETA:

1. BNCC: 3 habilidades com código relacionadas ao conteúdo gramatical

2. OBJETIVOS: 1 geral + 3 específicos com verbos de ação

3. DESENVOLVIMENTO:

▸ ENTRADA PELO TEXTO (15 min)
Apresente um texto autêntico do gênero [GÊNERO]. Faça leitura compartilhada. Perguntas de compreensão geral antes de chegar na gramática.

▸ OBSERVAÇÃO E DESCOBERTA (10 min)
"O que você percebe de interessante nas palavras/frases desse texto?" — indução ao conteúdo gramatical. Quadro de descobertas coletivo. Professor medeia sem revelar a regra ainda.

▸ SISTEMATIZAÇÃO (10 min)
Sistematize com os alunos a regra/conceito a partir das descobertas. Use exemplos do texto + exemplos do cotidiano. Ancore na realidade dos alunos.

▸ PRÁTICA CONTEXTUALIZADA (15 min)
3 atividades progressivas:
— Atividade 1: identificação no texto (mais fácil)
— Atividade 2: classificação/transformação em novos contextos
— Atividade 3: produção de frases/parágrafo usando o conteúdo

▸ VERIFICAÇÃO E FECHAMENTO (5 min)
Correção coletiva. "Para que serve isso na nossa escrita/fala?" — reflexão sobre o uso real.

4. ATIVIDADES IMPRESSAS: crie as 3 atividades completas com gabarito

5. ERROS ESPERADOS: liste os 5 erros mais comuns dos alunos neste conteúdo e como tratar cada um

6. JOGO DE FIXAÇÃO: descreva um jogo simples de 10 minutos para consolidar o conteúdo

7. ADAPTAÇÕES para diferentes níveis da turma

Gere o plano completo com todas as atividades prontas para imprimir.` },

    { titulo:"Oralidade — Debate e Expressão Oral", texto:`Aja como especialista em Didática do Português e desenvolvimento das competências orais no Ensino Fundamental. Crie um PLANO DE AULA COMPLETO focado em oralidade com as seguintes especificações:

    { titulo:"Rubrica de Trabalho e Pesquisa Histórica", texto:`Aja como um avaliador especialista em rubricas para trabalhos de História do Ensino Fundamental. Crie uma rubrica completa com as seguintes especificações:

    { titulo:"Slam de Poesia e Arte Visual", texto:`Aja como um professor de Artes especialista em projetos de poesia visual e performance para o Ensino Fundamental. Crie um projeto completo de slam com as seguintes especificações:

// ============================================================
// LÓGICA DO APP
// ============================================================
let materiaAtiva = null;
let categoriaAtiva = null;

function fazerLogin() {
    const email = document.getElementById('email-input').value.trim().toLowerCase();
    const erro = document.getElementById('login-error');
    const autorizados = EMAILS_AUTORIZADOS.map(e => e.toLowerCase());
    if (!email) { erro.style.display='block'; erro.textContent='Digite seu email.'; return; }
    if (autorizados.includes(email)) {
        localStorage.setItem('prompts_email', email);
        iniciarApp(email);
    } else {
        erro.style.display='block';
        erro.textContent='Email não encontrado. Verifique se é o mesmo email usado na compra ou entre em contato pelo Instagram.';
    }
}

document.getElementById('email-input').addEventListener('keydown', e => { if(e.key==='Enter') fazerLogin(); });

function fazerLogout() {
    localStorage.removeItem('prompts_email');
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('email-input').value='';
}

function iniciarApp(email) {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-email-display').textContent = email;
    renderSidebar();
    renderWelcome();
}

function renderSidebar() {
    const menu = document.getElementById('sidebar-menu');
    menu.innerHTML = MATERIAS.map(m => `
        <div class="sidebar-item" id="sb-${m.id}" onclick="selecionarMateria('${m.id}')">
            <span class="icon">${m.icon}</span>
            <span>${m.nome}</span>
            <span class="sidebar-count">25</span>
        </div>
    `).join('');
}

function renderWelcome() {
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div class="welcome-header">
            <h1 class="welcome-title">Sua Biblioteca de Prompts 🚀</h1>
            <p class="welcome-sub">200 prompts organizados por matéria e tipo. Clique em uma matéria para começar.</p>
        </div>
        <div class="welcome-grid">
            ${MATERIAS.map(m => `
                <div class="welcome-card" onclick="selecionarMateria('${m.id}')">
                    <div class="wc-icon">${m.icon}</div>
                    <div class="wc-name">${m.nome}</div>
                    <div class="wc-count">25 prompts</div>
                </div>
            `).join('')}
        </div>
    `;
}

function selecionarMateria(id) {
    materiaAtiva = id;
    categoriaAtiva = CATEGORIAS[0];
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    document.getElementById('sb-'+id)?.classList.add('active');
    renderMateria();
}

function selecionarCategoria(cat) {
    categoriaAtiva = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-cat="${cat}"]`)?.classList.add('active');
    renderPrompts();
}

function renderMateria() {
    const m = MATERIAS.find(x => x.id === materiaAtiva);
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div class="subject-header">
            <div class="subject-icon-big">${m.icon}</div>
            <div>
                <div class="subject-name">${m.nome}</div>
                <div class="subject-total">25 prompts em 5 categorias</div>
            </div>
        </div>
        <div class="cat-tabs">
            ${CATEGORIAS.map(c => `
                <button class="cat-tab ${c===categoriaAtiva?'active':''}" data-cat="${c}" onclick="selecionarCategoria('${c}')">${c}</button>
            `).join('')}
        </div>
        <div id="prompts-area"></div>
    `;
    renderPrompts();
}

function renderPrompts() {
    const dados = PROMPTS[materiaAtiva]?.[categoriaAtiva] || [];
    window.__promptsAtivos = dados;
    const area = document.getElementById('prompts-area');
    area.innerHTML = '<div class="prompts-list">' +
        dados.map((p,i) => {
            const titulo = p.titulo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const textoHtml = p.texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return `<div class="prompt-card">
                <div class="prompt-header-bar">
                    <div class="prompt-num">${i+1}</div>
                    <div class="prompt-title-text">${titulo}</div>
                </div>
                <div class="prompt-body-area">
                    <div class="prompt-text-box">${textoHtml}</div>
                    <div class="copy-btn-wrap">
                        <button class="copy-btn" data-idx="${i}" onclick="copiarPromptIdx(this)">📋 Copiar Prompt</button>
                    </div>
                </div>
            </div>`;
        }).join('') +
    '</div>';
}

function copiarPromptIdx(btn) {
    const idx = parseInt(btn.getAttribute('data-idx'));
    const texto = window.__promptsAtivos[idx].texto;
    copiarPrompt(btn, texto);
}

function copiarPrompt(btn, texto) {
    navigator.clipboard.writeText(texto).then(() => {
        btn.textContent='✅ Copiado!';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 Copiar'; btn.classList.remove('copied'); }, 2000);
    }).catch(()=>{
        const ta = document.createElement('textarea');
        ta.value = texto; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent='✅ Copiado!'; btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 Copiar'; btn.classList.remove('copied'); }, 2000);
    });
}

// Auto-login se já estiver logado
window.addEventListener('load', () => {
    const email = localStorage.getItem('prompts_email');
    if (email) iniciarApp(email);
});
